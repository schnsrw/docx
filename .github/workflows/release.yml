name: Release

# Tag-driven release. Pushing a SemVer tag (vX.Y.Z) builds the
# bundled Docker image, publishes it to Docker Hub as both
# `vX.Y.Z` and `latest`, and creates a GitHub Release with the
# tag's commit log as the body.
#
# Setup (already done by the maintainer):
#   - Environment `dockerhub` with secrets:
#       DOCKERHUB_USERNAME  — docker.io login
#       DOCKERHUB_TOKEN     — scoped access token (Read/Write/Delete on
#                              schnsrw/casual-editor)
#
# Usage:
#   git tag v0.0.1 -m "first release"
#   git push origin v0.0.1
#
# Pre-release tags (e.g. v0.0.1-rc.1) skip the `latest` tag so a release
# candidate doesn't move the main pointer.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

permissions:
  contents: write

jobs:
  docker:
    name: Publish bundled image
    runs-on: ubuntu-latest
    environment: dockerhub
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/casual-editor
          tags: |
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.prerelease == 'false' }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Compose release notes
        id: notes
        run: |
          # Find the previous tag (chronologically before this one) so
          # the body is just the commits since then. Falls back to the
          # full history for the very first tag.
          prev=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
          {
            echo "## What's in this release"
            echo ""
            if [ -n "$prev" ]; then
              echo "Changes since \`$prev\`:"
              echo ""
              git log --pretty='- %s' "$prev..HEAD"
            else
              echo "First tagged release."
              echo ""
              git log --pretty='- %s' HEAD
            fi
            echo ""
            echo "## Self-host"
            echo ""
            echo '```bash'
            echo "docker run --rm -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/casual-editor:${GITHUB_REF_NAME#v}"
            echo '```'
            echo ""
            echo "Then open http://localhost:8080. Upload a .docx, click Share, send the link."
          } > release-notes.md
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            flags+=(--prerelease)
          fi
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.path }}" \
            "${flags[@]}"
